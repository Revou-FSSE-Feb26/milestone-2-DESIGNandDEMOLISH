<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RevoFun|Number Guess?</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="../JS/utils.js" defer></script>
    <script src="../JS/numberGuessing.js" defer></script>
  </head>
  <body
    class="flex justify-center items-center bg-[linear-gradient(to_bottom,#2a2a2a,#171717,#0a0a0a)] min-h-screen"
  >
    <button>
      <a
        class="text-3xl mt-0 text-white absolute left-4 top-4"
        href="../index.html"
        >🀫 Back</a
      >
    </button>
    <section
      id="boardContainer"
      class="hidden mb-10 border absolute p-5 rounded-2xl text-white bg-gray-900 h-160 w-130"
    >
      <div>
        <h2 class="text-5xl p-5 text-center">Leader Board</h2>
        <div id="userList" class="text-2xl pl-[20px]"></div>
      </div>
      <div class="flex justify-center mt-20">
        <button
          id="replay"
          class="text-center cursor-pointer bg-green-500 rounded-full"
        >
          Play Again
        </button>
      </div>
    </section>
    <form
      id="container"
      class="flex flex-col text-white justify-center gap-5 items-center mb-10 border p-5 rounded-xl w-100 h-100 absolute bg-black"
    >
      <label for="userName">Username</label>
      <input
        type="text"
        id="userName"
        class="border-b-2"
        placeholder="Username"
        required
      />
      <button id="submitButton" class="bg-white rounded-full text-black p-3">
        Start Game
      </button>
    </form>
    <section class="h-100 w-100 rounded-2xl bg-gray-600 text-white">
      <div class="grid gap-5 mt-10">
        <div class="flex flex-col items-center mx-auto gap-10">
          <form id="gameForm" class="flex flex-col gap-5 justify-center">
            <label class="text-3xl text-center" for="numberGuess"
              >Guess Your Numbers!</label
            >
            <input
              id="numberGuess"
              class="border-black bg-black text-center border-2 h-30 text-3xl"
              type="number"
            />
          </form>
        </div>
        <p id="chance" class="text-3xl text-center"></p>
        <p id="statusBar" class="flex justify-center">
          Click Guess to Continue!
        </p>
        <div class="flex justify-center gap-8">
          <button
            id="guess"
            class="border-black cursor-pointer border-2 px-2 rounded-full"
          >
            Guess
          </button>
          <button
            id="delete"
            class="border-black cursor-pointer border-2 rounded-full px-2"
          >
            Delete
          </button>
        </div>
      </div>
    </section>
  </body>
</html>
