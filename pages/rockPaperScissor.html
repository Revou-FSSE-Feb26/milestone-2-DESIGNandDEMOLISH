<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="../JS/utils.js" defer></script>
    <script src="../JS/rockPaperScissor.js" defer></script>
    <title>RevoFun|RockPapaerScissors</title>
    <style>
      @keyframes wiggle {
        0%,
        100% {
          transform: rotate(0deg);
        }
        25% {
          transform: rotate(-45deg);
        }
        75% {
          transform: rotate(45deg);
        }
      }

      .animate-wiggle {
        animation: wiggle 0.5s ease-in-out 4;
      }
    </style>
  </head>
  <body
    class="flex justify-center items-center bg-[linear-gradient(to_bottom,#2a2a2a,#171717,#0a0a0a)] text-white h-screen"
  >
    <button>
      <a class="text-3xl text-white absolute left-4 top-4" href="../index.html"
        >🀫 Back</a
      >
    </button>
    <section
      id="boardContainer"
      class="hidden mb-10 border absolute p-5 rounded-2xl text-white bg-gray-900 h-160 w-130"
    >
      <div>
        <h2 class="text-5xl p-5 text-center">Leader Board</h2>
        <div id="userList" class="text-2xl pl-[20px]"></div>
      </div>
      <div class="flex justify-center mt-20">
        <button
          id="replay"
          class="text-center cursor-pointer bg-green-500 rounded-full"
        >
          Play Again
        </button>
      </div>
    </section>

    <form
      id="container"
      class="flex flex-col text-white justify-center gap-5 items-center mb-10 border p-5 rounded-xl w-100 h-100 absolute bg-black z-[100]"
    >
      <label for="userName">Username</label>
      <input
        type="text"
        id="userName"
        class="border-b-2"
        placeholder="Username"
        required
      />
      <button id="submitButton" class="bg-white rounded-full text-black p-3">
        Start Game
      </button>
    </form>
    <section class="flex flex-col gap-10 z-[10]">
      <h1 class="text-3xl text-center my-5">ROCK-PAPER-SCISSOR GAMES</h1>

      <div id="resultArea">
        <div id="choiceImage" class="flex justify-center gap-40">
          <span>
            <img
              id="userAnimation"
              src="../image/rockIcon.png"
              width="100px"
              alt=""
            />
          </span>
          <span class="scale-x-[-1]">
            <img
              id="computerAnimation"
              src="../image/rockIcon.png"
              width="100px"
              alt=""
            />
          </span>
        </div>
        <div class="mt-10">
          <p id="statusBar" class="text-3xl text-center mb-6">Let's Play</p>
        </div>
      </div>

      <form id="gameForm" class="flex gap-10 my-5 justify-center">
        <div class="grid">
          <button id="rockButton" class="text-6xl cursor-pointer">✊</button>
          <label class="text-xl text-center">Rock</label>
        </div>
        <div class="grid">
          <button id="paperButton" class="text-6xl cursor-pointer">✋</button>
          <label class="text-xl text-center">Paper</label>
        </div>
        <div class="grid">
          <button id="scissorButton" class="text-6xl cursor-pointer">✌️</button>
          <label class="text-xl text-center">Scissor</label>
        </div>
      </form>
      <section></section>
      <section class="flex justify-center gap-20">
        <div>
          <p>Player Scores</p>
          <p id="userScore" class="text-center text-2xl">0</p>
        </div>
        <div>
          <p>Computer Scores</p>
          <p id="computerScore" class="text-center text-2xl">0</p>
        </div>
      </section>
      <section class="flex gap-20 justify-center">
        <div>
          <p>Player Choice</p>
          <p id="userDisplay" class="text-center text-2xl">⁇</p>
        </div>
        <div>
          <p>Computer Choise</p>
          <p id="computerDisplay" class="text-center text-2xl">⁇</p>
        </div>
      </section>
    </section>
  </body>
</html>
