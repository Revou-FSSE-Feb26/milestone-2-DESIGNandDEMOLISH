<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <header>
      <section
        class="grid md:grid-cols-[15%_85%] px-2 h-15 items-center border-red-500 border-4"
      >
        <div
          class="flex border-black w-full md:w-auto justify-between border-4"
        >
          <a href="#home">REVOFUN</a>
          <label for="menu-toogle" class="cursor-pointer md:hidden"
            >&#9776;</label
          >
        </div>
        <div
          class="flex w-full border-purple-500 border-4 h-13 items-center hidden md:block"
        >
          <input type="checkbox" id="menu-toogle" class="peer hidden" />
          <nav class="border-green-500 border-4 h-11">
            <ul class="grid grid-cols-3 gap-3">
              <li>
                <div
                  class="text-center border-gray-500 border-2 rounded-full hover:text-red-500 hover:text-lg"
                >
                  <a href="#home">homepage</a>
                </div>
              </li>
              <li>
                <div
                  class="text-center border-gray-500 border-2 rounded-full hover:text-red-500 hover:text-lg"
                >
                  <a href="#games">Game List</a>
                </div>
              </li>
              <li>
                <div
                  class="text-center border-gray-500 border-2 rounded-full hover:text-red-500 hover:text-lg"
                >
                  <a href="#contact">Contact Us</a>
                </div>
              </li>
            </ul>
          </nav>
          <!-- <div>
            <button>Login</button>
          </div> -->
        </div>
      </section>
    </header>
  </body>
</html>
